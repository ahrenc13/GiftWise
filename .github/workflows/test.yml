name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Dummy values so config_service doesn't error on missing required vars.
      # Real API calls are never made during these tests.
      ANTHROPIC_API_KEY: ci_dummy_key
      SECRET_KEY: ci_test_secret
      DATABASE_PATH: ./data/products.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      # -----------------------------------------------------------------------
      # Step 1: Syntax check all critical files.
      # Catches import errors, typos, missing colons, etc. before they deploy.
      # -----------------------------------------------------------------------
      - name: Syntax check — pipeline files
        run: |
          python -m py_compile giftwise_app.py
          python -m py_compile recommendation_service.py
          python -m py_compile profile_analyzer.py
          python -m py_compile gift_curator.py
          python -m py_compile post_curation_cleanup.py
          python -m py_compile multi_retailer_searcher.py
          python -m py_compile rapidapi_amazon_searcher.py
          python -m py_compile ebay_searcher.py
          python -m py_compile awin_searcher.py
          python -m py_compile cj_searcher.py
          python -m py_compile skimlinks_searcher.py
          python -m py_compile etsy_searcher.py
          echo "✓ All pipeline files pass syntax check"

      - name: Syntax check — service modules
        run: |
          python -m py_compile storage_service.py
          python -m py_compile config_service.py
          python -m py_compile product_schema.py
          python -m py_compile search_query_utils.py
          python -m py_compile smart_filters.py
          python -m py_compile interest_ontology.py
          python -m py_compile revenue_optimizer.py
          python -m py_compile site_stats.py
          echo "✓ All service modules pass syntax check"

      # -----------------------------------------------------------------------
      # Step 2: Run service module test suites.
      # storage_service uses real assertions — failures here block the merge.
      # Others are informational and show what's configured.
      # -----------------------------------------------------------------------
      - name: Service tests — storage_service (assertions)
        run: python storage_service.py

      - name: Service tests — search_query_utils
        run: python search_query_utils.py

      - name: Service tests — product_schema
        run: python product_schema.py

      - name: Service tests — config_service (informational)
        run: python config_service.py
