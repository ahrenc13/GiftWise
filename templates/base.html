    <title>{% block title %}Giftwise - AI Gift Recommendations{% endblock %}</title>

    <!-- Favicon -->

    {% block meta %}
    <meta name="description" content="AI-powered gift recommendations based on social media insights">
    {% endblock %}

    <style>
        /* Global Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f9fafb;
        }

        /* Navigation Styles */
        .nav {
            background: white;
            border-bottom: 2px solid #f0f0f0;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
        }

        .nav-logo {
            font-size: 1.4em;
            font-weight: 700;
            color: #667eea;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #555;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .hero-subtitle {
            font-size: 1.6em;
            margin-bottom: 15px;
            opacity: 0.95;
        }

        .hero-description {
            font-size: 1.2em;
            margin-bottom: 40px;
            opacity: 0.9;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-sm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .hero-sm h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .hero-sm p {
            font-size: 1.2em;
            opacity: 0.9;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Buttons */
        .cta-button {
            background: white;
            color: #667eea;
            padding: 20px 50px;
            font-size: 1.3em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .action-button {
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
            border: none;
        }

        .action-button.primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .action-button.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(16, 185, 129, 0.3);
        }

        .action-button.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .action-button.secondary:hover {
            background: #667eea;
            color: white;
        }

        /* Page Titles */
        .page-title {
            font-size: 2.5em;
            margin-bottom: 12px;
            color: #1f2937;
            text-align: center;
        }

        .page-subtitle {
            color: #6b7280;
            margin-bottom: 40px;
            text-align: center;
        }

        .section-title {
            text-align: center;
            font-size: 2.8em;
            margin-bottom: 60px;
            color: #1f2937;
        }

        /* Links */
        a {
            color: #667eea;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Footer Styles */
        .footer {
            background: #1f2937;
            color: white;
            padding: 50px 20px;
            margin-top: 60px;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-bottom: 30px;
        }

        .footer-section h4 {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: white;
        }

        .footer-section p,
        .footer-section a {
            display: block;
            margin: 8px 0;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
        }

        .footer-section a:hover {
            color: white;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-bottom p {
            opacity: 0.8;
            margin: 10px 0;
        }

        /* Form Styles */
        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        /* Utility Classes */
        .text-center {
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5em;
            }

            .hero-subtitle {
                font-size: 1.3em;
            }

            .hero-sm h1 {
                font-size: 1.8em;
            }

            .section-title {
                font-size: 2.2em;
            }

            .page-title {
                font-size: 2em;
            }

            .nav-links {
                gap: 15px;
                font-size: 0.9em;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>

    {% if onesignal_app_id %}
    <!-- OneSignal Web Push — activated when ONESIGNAL_APP_ID is set in Railway Variables -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "{{ onesignal_app_id }}",
                {% if onesignal_safari_id %}safari_web_id: "{{ onesignal_safari_id }}",{% endif %}
                notifyButton: { enable: false },  // We control the prompt ourselves
                allowLocalhostAsSecureOrigin: true,
                serviceWorkerParam: { scope: "/" },
                serviceWorkerPath: "/OneSignalSDKWorker.js"
            });
        });
    </script>
    {% endif %}
</body>
</html>
