name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask anthropic requests

      - name: Syntax check critical files
        run: |
          python3 -m py_compile giftwise_app.py
          python3 -m py_compile recommendation_service.py
          python3 -m py_compile post_curation_cleanup.py
          python3 -m py_compile gift_curator.py
          python3 -m py_compile profile_analyzer.py
          python3 -m py_compile multi_retailer_searcher.py
          python3 -m py_compile awin_searcher.py
          python3 -m py_compile cj_searcher.py
          python3 -m py_compile ebay_searcher.py
          python3 -m py_compile rapidapi_amazon_searcher.py
          python3 -m py_compile smart_filters.py
          python3 -m py_compile interest_ontology.py
          python3 -m py_compile revenue_optimizer.py
          python3 -m py_compile storage_service.py
          python3 -m py_compile search_query_utils.py
          python3 -m py_compile product_schema.py
          python3 -m py_compile config_service.py
          python3 -m py_compile database.py
          python3 -m py_compile site_stats.py
          python3 -m py_compile share_manager.py
          echo "✅ All syntax checks passed"

      - name: Run storage_service tests
        run: python3 storage_service.py

      - name: Run search_query_utils tests
        run: python3 search_query_utils.py

      - name: Run product_schema tests
        run: python3 product_schema.py

      - name: Run config_service tests
        env:
          ANTHROPIC_API_KEY: dummy-key-for-ci
        run: python3 config_service.py
